name: Feature Request
description: Got a suggestion for a feature request? Let us know!
title: "[Feature-Request]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this feature request!
  - type: textarea
    id: the-problem
    attributes:
      label: Is this request related to a problem?
      description: Is your feature request related to a problem? Please describe.
      placeholder: A clear and concise description of what the problem is. Ex. I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: Describe how your solution will solve the problem together with an assessment of possible side effects.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Considered alternatives
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: Clearly describe the alternatives that you considered and the reasoning why they did and/or did not work.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any context or screenshots about the feature request here.
      placeholder: Anything that may be important for the consideration of the request.
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/Logic-Shift/.github/docs/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true