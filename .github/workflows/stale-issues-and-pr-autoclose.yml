# This workflow warns and then closes issues and PRs that have had no activity for a specified amount of time.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/actions/stale
name: Stale Issues and PR Autoclose

on:
  schedule:
  - cron: '0 2 * * */2' # At 02:00 on every 2nd day-of-week.

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
    - uses: actions/stale@v5
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        days-before-issue-stale: 60
        days-before-pr-stale: 60
        stale-issue-message: |
            This issue is being closed since it has been open for 60 days with no activity.

            Please open a new issue [here](https://github.com/Logic-Shift/.github/issues/new/choose) if needed. Don't forget to mention this issue.
        stale-pr-message: |
            This PR is being closed since it has been open for 60 days with no activity.

            Open a new PR if deemed necessary.
        stale-issue-label: 'no-issue-activity'
        stale-pr-label: 'no-pr-activity'
